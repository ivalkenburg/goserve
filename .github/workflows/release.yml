name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            asset_name: goserve-windows-x64.exe
          - goos: darwin
            goarch: amd64
            asset_name: goserve-macos-x64
          - goos: darwin
            goarch: arm64
            asset_name: goserve-macos-arm64
          - goos: linux
            goarch: amd64
            asset_name: goserve-linux-x64

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          VERSION="${{ github.ref_name }}"
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION#v}" -o ${{ matrix.asset_name }} .

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: ${{ matrix.asset_name }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            goserve-windows-x64.exe
            goserve-macos-x64
            goserve-macos-arm64
            goserve-linux-x64
          generate_release_notes: true
